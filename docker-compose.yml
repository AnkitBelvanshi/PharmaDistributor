version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pharma_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pharma_distributor
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pharma_server
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/pharma_distributor?schema=public
      NODE_ENV: production
      PORT: 5000
    env_file:
      - ./server/.env
    ports:
      - '5000:5000'
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: pharma_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '3000:80'

volumes:
  pgdata:
