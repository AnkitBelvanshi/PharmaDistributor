databases:
  - name: pharma-db
    databaseName: pharma_distributor
    user: pharma_user
    plan: free
    region: singapore

services:
  - type: web
    name: crossmeds-api
    plan: free
    runtime: node
    region: singapore
    rootDir: server
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && node src/app.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pharma-db
          property: connectionString
      - key: CLIENT_URL
        value: https://www.crossmeds.com
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # Fill these in Render dashboard after deploy:
      - key: RECAPTCHA_SECRET_KEY
        value: ""
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: ADMIN_EMAIL
        value: ""

 - type: static
    name: crossmeds-web
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://crossmeds-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
